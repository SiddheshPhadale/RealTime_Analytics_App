services:
  kafka:
    image: apache/kafka:latest
    container_name: rta_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7-alpine
    container_name: rta_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  analytics-producer:
    build:
      context: .
      dockerfile: analytics-producer/Dockerfile
    container_name: rta_analytics_producer
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka

  analytics-consumer:
    build:
      context: .
      dockerfile: analytics-consumer/Dockerfile
    container_name: rta_analytics_consumer
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy

  analytics-api:
    build:
      context: .
      dockerfile: analytics-api/Dockerfile
    container_name: rta_analytics_api
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: stream-insight-shine/Dockerfile
    container_name: rta_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PRODUCER_API_BASE=http://localhost:8080
      - VITE_ANALYTICS_API_BASE=http://localhost:8082
    depends_on:
      - analytics-producer
      - analytics-api
